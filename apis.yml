description: >
  crates.io is the official package registry for the Rust programming language,
  operated by the crates.io team under the Rust Foundation with infrastructure
  support from Amazon Web Services and Fastly. It exposes a Web API at
  /api/v1 used by Cargo and the website for search, publishing, yanking, and
  owner management, plus a sparse HTTP index at index.crates.io that has been
  Cargo's default registry protocol since Rust 1.70 (June 2023). The legacy
  git index is still mirrored. Every published version is checksummed with
  SHA-256 and companion documentation is auto-built on docs.rs. The crates.io
  source code is dual-licensed under Apache-2.0 and MIT and runs on Rust
  (axum, diesel) with a SvelteKit frontend.
