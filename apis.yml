  description: >
    The crates.io Web API exposes the endpoints used by Cargo and the crates.io
    website to search the registry, fetch crate and version metadata, publish
    new versions, yank and unyank versions, and manage crate ownership. Hosted
    at https://crates.io/api/v1, it is the canonical implementation of the
    Cargo Registry Web API specification documented in the Cargo book.
- aid: crates-io:crates-io-sparse-index
  name: crates.io Sparse Index
  tags:
  - Index
  - Package Registry
  - Rust
  - Sparse Protocol
  humanURL: https://doc.rust-lang.org/cargo/reference/registry-index.html
  properties:
  - url: https://doc.rust-lang.org/cargo/reference/registry-index.html
    type: Documentation
  - url: https://blog.rust-lang.org/2023/03/09/Rust-1.68.0.html
    type: Documentation
    name: Sparse registry protocol stabilized in Rust 1.68
  - url: openapi/crates-io-sparse-index-openapi.yml
    type: OpenAPI
  - url: json-schema/crates-io-index-entry-schema.json
    type: JSONSchema
  - url: examples/crates-io-config-example.json
    type: Example
  - url: examples/crates-io-sparse-index-example.json
    type: Example
  - type: NaftikoCapability
    url: capabilities/sparse-index.yaml
  description: >
    The crates.io sparse index at https://index.crates.io serves the registry
    config document plus per-crate newline-delimited JSON metadata files
    over HTTP, replacing the legacy git index clone. Cargo uses the sparse
    protocol by default since Rust 1.70 (June 2023). Each index entry records
    a version's dependencies, features, SHA-256 checksum, and yank state.
